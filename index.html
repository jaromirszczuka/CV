<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>DomekOS CV</title>

<style>

body{
margin:0;
background:black;
color:#00ff66;
font-family:monospace;
overflow:hidden;
}

/* INTRO VIDEO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#intro video{
width:100%;
height:100%;
object-fit:cover;
}

/* BIOS */

#bios{
opacity:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#terminal{
width:900px;
}

pre{
font-size:20px;
line-height:1.4;
}

/* CRT scanlines */

pre::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(0,0,0,0) 0px,
rgba(0,0,0,0) 2px,
rgba(0,0,0,0.35) 3px
);
pointer-events:none;
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
}

</style>

</head>

<body>

<!-- INTRO VIDEO -->

<div id="intro">

<video id="introVideo" autoplay muted playsinline>

<source src="intro.mp4" type="video/mp4">

</video>

</div>


<!-- BIOS SCREEN -->

<div id="bios">

<div id="terminal">

<pre id="boot"></pre>

<div id="cmd" style="display:none">

<span>C:\CV></span>
<input id="command">

<div id="output"></div>

</div>

</div>

</div>


<script>

/* VIDEO -> BIOS */

const video = document.getElementById("introVideo")

video.onended = function(){

document.getElementById("intro").style.display = "none"

document.getElementById("bios").style.opacity = "1"

setTimeout(startBoot,700)

}


/* BIOS BOOT */

const boot = document.getElementById("boot")

const bootLines=[

"Phoenix BIOS v4.0 Release 6.0",
"Copyright 1985-1999 Phoenix Technologies Ltd.",
"",
"Detecting hardware...",
"CPU: Intel Pentium detected",
"",
"Memory Test:"

]

let ram=0

function typeLine(text,callback){

let i=0

let interval=setInterval(()=>{

boot.textContent+=text[i]

i++

if(i>=text.length){

clearInterval(interval)

boot.textContent+="\n"

setTimeout(callback,200)

}

},20)

}


function startBoot(){

let i=0

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++
next()

})

}else{

memoryTest()

}

}

next()

}


function memoryTest(){

let interval=setInterval(()=>{

ram+=512

boot.textContent=boot.textContent.replace(/Memory Test:.*/,"Memory Test: "+ram+"K")

if(ram>=8192){

clearInterval(interval)

boot.textContent+=" OK\n\n"
boot.textContent+="Booting DomekOS...\n\n"
boot.textContent+="Type /help to list commands\n\n"

document.getElementById("cmd").style.display="block"

}

},120)

}


/* TERMINAL */

const commandInput=document.getElementById("command")
const output=document.getElementById("output")

commandInput.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=commandInput.value.trim()

let res=""

switch(cmd){

case "/help":
res="/profil /wyksztalcenie /umiejetnosci /zadania /kontakt"
break

case "/profil":
res="Kandydat: Domek\nStanowisko: Młodszy Informatyk"
break

case "/wyksztalcenie":
res="Technikum Informatyczne"
break

case "/umiejetnosci":
res="Instalacja Windows\nDiagnostyka sprzętu\nLinux\nAutomatyzacja Python"
break

case "/zadania":
res="Instalacja systemów operacyjnych\nKonfiguracja stacji roboczych\nHelpdesk\nAktualizacje oprogramowania"
break

case "/kontakt":
res="email: twoj@email.pl"
break

default:
res="Unknown command"

}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>"

commandInput.value=""

}

})

</script>

</body>

</html>
