<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jaromir Szczuka CV</title>

<style>

body{
margin:0;
background:black;
color:#00ff66;
font-family:monospace;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.error{
  color:#ff3b3b;
  font-weight:bold;
  white-space:pre-wrap;
}
  
/* XP WINDOW */

#xpWindow{
background:#ece9d8;
border:2px solid #0054e3;
width:320px;
font-family:Tahoma;
color:black;
box-shadow:4px 4px 10px rgba(0,0,0,0.5);
}

#xpTitle{
background:linear-gradient(#3a6ea5,#1c3f94);
color:white;
padding:4px;
font-size:14px;
}

#xpContent{
padding:20px;
text-align:center;
}

button{
margin:10px;
padding:6px 20px;
font-family:Tahoma;
}

/* VIDEO */

#videoContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

#videoContainer video{
height:80vh;
aspect-ratio:16/9;
object-fit:cover;
border-radius:6px;
}

/* BIOS */

#bios{
display:none;
width:90vw;
max-width:900px;
}

pre{
white-space:pre-wrap;
word-break:break-word;
}

/* TERMINAL */

#command{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
width:300px;
}

/* PHOTO */

.photo{
margin-top:10px;
max-width:120px;
image-rendering:pixelated;
}

/* wolniejsza animacja */

.pixelEffect{
animation: sharpen 0.9s linear;
}

@keyframes sharpen{

0%{filter:blur(12px)}
50%{filter:blur(5px)}
100%{filter:blur(0)}

}

</style>

</head>

<body>

<div id="xpWindow">

<div id="xpTitle">Uruchamianie aplikacji</div>

<div id="xpContent">

Czy chcesz uruchomić aplikację  
<b>Jaromir Szczuka CV</b> ?

<br><br>

<button onclick="startApp()">Tak</button>
<button onclick="noApp()">Nie</button>

</div>

</div>


<div id="videoContainer">

<video id="introVideo" playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

</div>


<div id="bios">

<pre id="boot"></pre>

<div id="photoBox"></div>

<span id="prompt"></span>
<input id="command">

</div>


<script>

/* XP */

function noApp(){

document.getElementById("xpWindow").style.display="none"

setTimeout(()=>{
document.getElementById("xpWindow").style.display="block"
},300)

}

function startApp(){

document.getElementById("xpWindow").style.display="none"
startVideo()

}

/* VIDEO */

function startVideo(){

const video=document.getElementById("introVideo")

document.getElementById("videoContainer").style.display="flex"

video.play()

video.onended=function(){

document.getElementById("videoContainer").style.display="none"
startBoot()

}

}

/* BIOS */

const boot=document.getElementById("boot")

const bootLines=[

"Urząd statystyczny w Katowicach 2.0",
"Copyright 1912 - 1945 Miasto Katowice",

"\nWykrywanie nowego zgłoszenia...",
"CV: Jaromir Szczuka - wykryto",

"\nKalibracja kubka z kawą",
"Sprawdzanie poziomu motywacji",
"Test cierpliwości rekrutera",
".",
".",
"ok",


]

let i=0

function typeLine(text,callback){

let index=0

let interval=setInterval(()=>{

boot.textContent+=text[index]

index++

if(index>=text.length){

clearInterval(interval)
boot.textContent+="\n"
setTimeout(callback,200)

}

},55)

}

function startBoot(){

document.getElementById("bios").style.display="block"

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++
next()

})

}else{

startLoading()

}

}

next()

}

/* LOADING */

function startLoading(){

let percent=0

boot.textContent+="\n\nUruchamianie CV kandydata... 0%"

let interval=setInterval(()=>{

percent+=Math.floor(Math.random()*3)+2
if(percent>100) percent=100

boot.textContent =
boot.textContent.replace(/Uruchamianie CV kandydata... \d+%/,
"Uruchamianie CV kandydata... "+percent+"%")

if(percent==100){

clearInterval(interval)

boot.textContent+="\n\nNapisz /pomoc aby wyświetlić dostępne komendy\n\n"

startTerminal()

}

},120)

}

/* TERMINAL */

function clearConsole(){

boot.textContent=""
document.getElementById("photoBox").innerHTML=""

boot.textContent+="C:\\CV> /pomoc\n"
boot.textContent+="/profil /wyksztalcenie /umiejetnosci /zdjecie\n\n"

}

function restoreSystem(){

let percent=0

boot.textContent+="\nPrzywracanie ustawień... 0%"

let interval=setInterval(()=>{

percent+=Math.floor(Math.random()*5)+2
if(percent>100) percent=100

boot.textContent =
boot.textContent.replace(/Przywracanie ustawień... \d+%/,
"Przywracanie ustawień... "+percent+"%")

if(percent==100){

clearInterval(interval)

setTimeout(()=>{
clearConsole()
},1200)

}

},260)

}

function startTerminal(){

const command=document.getElementById("command")
const prompt=document.getElementById("prompt")

prompt.textContent="C:\\CV> "

command.focus()

let photoStage=0

command.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=command.value.trim().toLowerCase()

boot.textContent+="C:\\CV> "+cmd+"\n"

let res=""

if(cmd==="/pomoc"){
res="/profil /wyksztalcenie /umiejetnosci /zdjecie"
}

else if(cmd==="/profil"){
res="Jan Kowalski\nKandydat na młodszego informatyka"
}

else if(cmd==="/wyksztalcenie"){
res="Technikum informatyczne"
}

else if(cmd==="/umiejetnosci"){
res="Instalacja systemów\nHelpdesk\nDiagnostyka sprzętu"
}

else if(cmd==="/zdjecie"){

photoStage=1

document.getElementById("photoBox").innerHTML=
'<img id="photo" class="photo" src="obraz.png">'

boot.textContent+="Czy poprawić jakość zdjęcia? (tak/nie)\n"

command.value=""
return

}

else if(cmd==="tak" && photoStage>0){

photoStage++

let photo=document.getElementById("photo")

photo.src="obraz"+photoStage+".png"

photo.classList.remove("pixelEffect")
void photo.offsetWidth
photo.classList.add("pixelEffect")

if(photoStage==4){

boot.innerHTML += `<span class="error">
=== SYSTEM ERROR ===
Kod: IMG_OVRFLW
Opis: Przekroczono maksymalną rozdzielczość obrazu
Operacja przerwana
Spróbuj ponownie lub przywróć ustawienia
==================
</span>\n`
restoreSystem()
photoStage=0

}else{

boot.textContent+="Czy poprawić jakość zdjęcia? (tak/nie)\n"

}

command.value=""
return

}

else if(cmd==="nie" && photoStage>0){

clearConsole()
photoStage=0
command.value=""
return

}

else{
res="Nieznana komenda"
}

boot.textContent+=res+"\n"

command.value=""

}

})

}

</script>

</body>

</html>
