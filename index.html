<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DomekOS CV</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:monospace;
overflow:hidden;
}

#scene{
position:relative;
width:900px;
transform:scale(0.7);
animation:zoom 3s forwards;
}

@keyframes zoom{
from{transform:scale(0.7)}
to{transform:scale(1)}
}

#desk{
width:100%;
display:block;
}

#screen{

position:absolute;

top:135px;
left:270px;

width:360px;
height:240px;

background:black;
color:#00ff66;

padding:12px;

overflow:auto;

border-radius:25px;

box-shadow:
0 0 25px #00ff66 inset,
0 0 50px #00ff66;

animation:flicker 0.12s infinite;

}

/* scanlines */

#screen::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
repeating-linear-gradient(
to bottom,
rgba(0,0,0,0) 0px,
rgba(0,0,0,0) 2px,
rgba(0,0,0,0.35) 3px
);

pointer-events:none;
}

/* CRT flicker */

@keyframes flicker{
0%{opacity:1}
50%{opacity:0.96}
100%{opacity:1}
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
outline:none;
width:200px;
}

</style>
</head>

<body>

<audio id="bootSound" src="boot.mp3"></audio>

<div id="scene">

<img id="desk" src="desk.png">

<div id="screen">

<pre id="boot"></pre>

<div id="terminal" style="display:none;">
<span>C:\CV></span>
<input id="command" autofocus>
<div id="output"></div>
</div>

</div>

</div>

<script>

document.getElementById("bootSound").play();

const boot = document.getElementById("boot");

const bootLines = [

"Phoenix BIOS v4.0 Release 6.0",
"Copyright 1985-1999 Phoenix Technologies",
"",
"Detecting hardware...",
"CPU: Intel Pentium 200MHz detected",
"Checking NVRAM...",
"",
"Memory Test:"

];

let ram = 0;

function typeLine(text, callback){

let i=0;

let interval=setInterval(()=>{

boot.textContent += text[i];

i++;

if(i>=text.length){

clearInterval(interval);

boot.textContent+="\n";

setTimeout(callback,200);

}

},20);

}

function bootSequence(){

let i=0;

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++;

next();

});

}else{

memoryTest();

}

}

next();

}

function memoryTest(){

let interval=setInterval(()=>{

ram+=512;

boot.textContent = boot.textContent.replace(/Memory Test:.*/,"Memory Test: "+ram+"K");

if(ram>=8192){

clearInterval(interval);

boot.textContent+=" OK\n\n";

boot.textContent+="Booting DomekOS...\n\n";

boot.textContent+="Type /help\n\n";

setTimeout(()=>{

document.getElementById("terminal").style.display="block";

},1000);

}

},120);

}

bootSequence();

const commandInput=document.getElementById("command");

const output=document.getElementById("output");

commandInput.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=commandInput.value.trim();

let res="";

switch(cmd){

case "/help":
res="Commands:\n/wyksztalcenie\n/umiejetnosci\n/projekty\n/kontakt\n/scan";
break;

case "/wyksztalcenie":
res="Technikum Informatyczne\nProfil: Informatyka";
break;

case "/umiejetnosci":
res="Python\nLinux\nHTML\nOBS\nAutomatyzacja";
break;

case "/projekty":
res="Bot TikTok Live\nMini gry do streamów\nAutomatyzacje OBS";
break;

case "/kontakt":
res="email: twoj@email\nGitHub: github.com/twojprofil";
break;

case "/scan":
res="Scanning system...\n\nSkill detected:\nPython\nLinux\nAutomation\nStreaming Tools\nCreative Problem Solving";
break;

case "/hire":
res="Candidate status: EXCELLENT\nRecommendation: HIRE IMMEDIATELY";
break;

default:
res="Unknown command. type /help";

}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>";

commandInput.value="";

}

});

</script>

</body>
</html>
