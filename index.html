<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jan Kowalski CV</title>

<style>

body{
margin:0;
background:black;
color:#00ff66;
font-family:monospace;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* XP WINDOW */

#xpWindow{
background:#ece9d8;
border:2px solid #0054e3;
width:320px;
font-family:Tahoma;
color:black;
box-shadow:4px 4px 10px rgba(0,0,0,0.5);
}

#xpTitle{
background:linear-gradient(#3a6ea5,#1c3f94);
color:white;
padding:4px;
font-size:14px;
}

#xpContent{
padding:20px;
text-align:center;
}

button{
margin:10px;
padding:6px 20px;
font-family:Tahoma;
}

/* VIDEO */

#videoContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#videoContainer video{
width:100%;
height:100%;
object-fit:cover;
}

/* BIOS */

#bios{
display:none;
max-width:90vw;
}

pre{
white-space:pre-wrap;
word-break:break-word;
}

/* TERMINAL */

#terminal{
display:none;
max-width:90vw;
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
}

/* ZDJĘCIE */

.photo{
margin-top:10px;
image-rendering:pixelated;
}

.pixelEffect{
animation: sharpen 0.6s linear;
}

@keyframes sharpen{

0%{filter:blur(10px)}
50%{filter:blur(3px)}
100%{filter:blur(0)}

}

</style>

</head>

<body>


<div id="xpWindow">

<div id="xpTitle">
Uruchamianie aplikacji
</div>

<div id="xpContent">

Czy chcesz uruchomić aplikację  
<b>Jan Kowalski CV</b> ?

<br><br>

<button onclick="startApp()">Tak</button>
<button onclick="noApp()">Nie</button>

</div>

</div>


<div id="videoContainer">

<video id="introVideo" playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

</div>


<div id="bios">

<pre id="boot"></pre>

</div>


<div id="terminal">

<span>C:\CV></span>
<input id="command">

<div id="output"></div>

</div>


<script>

/* XP */

function noApp(){

document.getElementById("xpWindow").style.display="none"

setTimeout(()=>{
document.getElementById("xpWindow").style.display="block"
},300)

}

function startApp(){

document.getElementById("xpWindow").style.display="none"

startVideo()

}


/* VIDEO */

function startVideo(){

const video=document.getElementById("introVideo")

document.getElementById("videoContainer").style.display="flex"

video.play()

video.onended=function(){

document.getElementById("videoContainer").style.display="none"

startBoot()

}

}


/* BIOS */

const boot=document.getElementById("boot")

const bootLines=[

"Urząd statystyczny w Katowicach 2.0",
"Copyright 1912 - 1945 Miasto Katowice",
"",
"Niezidentyfikowany",
"Wykrywanie nowego zgłoszenia...",
"CV: Jan Kowalski wykryto",
"",
"Kalibracja kubka z kawą...",
"Sprawdzanie poziomu motywacji...",
"Test cierpliwości rekrutera...",
"",
"Uruchamianie CV kandydata..."

]

let i=0

function typeLine(text,callback){

let index=0

let interval=setInterval(()=>{

boot.textContent+=text[index]

index++

if(index>=text.length){

clearInterval(interval)

boot.textContent+="\n"

setTimeout(callback,200)

}

},20)

}

function startBoot(){

document.getElementById("bios").style.display="block"

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++
next()

})

}else{

startLoading()

}

}

next()

}


/* LOADING W TEJ SAMEJ LINII */

function startLoading(){

let percent=0

boot.textContent+="\nUruchamianie CV kandydata... 0%"

let interval=setInterval(()=>{

percent+=Math.floor(Math.random()*8)+2

if(percent>100) percent=100

boot.textContent = boot.textContent.replace(/Uruchamianie CV kandydata... \d+%/,"Uruchamianie CV kandydata... "+percent+"%")

if(percent==100){

clearInterval(interval)

boot.textContent+="\n\nNapisz /pomoc aby wyświetlić dostępne komendy\n\n"

startTerminal()

}

},120)

}


/* TERMINAL */

function startTerminal(){

document.getElementById("terminal").style.display="block"

const command=document.getElementById("command")
const output=document.getElementById("output")

command.focus()

let photoStage=0

command.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=command.value.trim().toLowerCase()

let res=""

if(cmd==="/pomoc"){

res="/profil /wyksztalcenie /umiejetnosci /zdjęcie"

}

else if(cmd==="/profil"){

res="Jan Kowalski\nKandydat na młodszego informatyka"

}

else if(cmd==="/wyksztalcenie"){

res="Technikum informatyczne"

}

else if(cmd==="/umiejetnosci"){

res="Instalacja systemów\nHelpdesk\nDiagnostyka sprzętu"

}

else if(cmd==="/zdjęcie"){

photoStage=1

output.innerHTML+=`

<div>

<img id="photo" class="photo" src="obraz.png" width="120">

<p>Jakość: 140p</p>
<p>Czy poprawić jakość zdjęcia? (tak/nie)</p>

</div>

`

command.value=""
return

}

else if(cmd==="tak" && photoStage>0){

photoStage++

let photo=document.getElementById("photo")

photo.classList.add("pixelEffect")

setTimeout(()=>{

photo.classList.remove("pixelEffect")

},600)

if(photoStage==2){

photo.width=220

output.innerHTML+="<p>Jakość: 360p</p><p>Czy poprawić jakość zdjęcia? (tak/nie)</p>"

}

else if(photoStage==3){

photo.width=340

output.innerHTML+="<p>Jakość: HD</p><p>Czy poprawić jakość zdjęcia? (tak/nie)</p>"

}

else{

photo.src="obraz2.png"

output.innerHTML+="<p>BŁĄD: przekroczono maksymalną jakość zdjęcia.</p>"

photoStage=0

}

command.value=""
return

}

else if(cmd==="nie"){

res="Anulowano poprawę jakości."

photoStage=0

}

else{

res="Nieznana komenda"

}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>"

command.value=""

}

})

}

</script>

</body>

</html>
