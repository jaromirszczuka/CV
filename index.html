<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>DomekOS CV</title>

<style>

html, body{
margin:0;
padding:0;
background:black;
color:#00ff66;
font-family:monospace;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
touch-action:manipulation;
}

#screen{
font-size:22px;
width:800px;
}

#hiddenInput{
opacity:0;
position:absolute;
font-size:16px;
}

#videoContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#videoContainer video{
width:100%;
height:100%;
object-fit:cover;
}

#bios{
display:none;
width:900px;
max-width:90%;
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
}

</style>

</head>

<body>

<div id="screen">

<pre>

Candidate system ready.
Press any key then ENTER to boot Candidate CV

</pre>

</div>

<input id="hiddenInput" autocomplete="off">

<div id="videoContainer">

<video id="introVideo" playsinline>
<source src="intro.mp4" type="video/mp4">
</video>

</div>

<div id="bios">

<pre id="boot"></pre>

</div>

<script>

const input = document.getElementById("hiddenInput")
const video = document.getElementById("introVideo")
const videoContainer = document.getElementById("videoContainer")

/* OTWÓRZ KLAWIATURĘ PO 1s */

setTimeout(()=>{
input.focus()
},1000)

/* CZEKAJ NA ENTER */

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){
startVideo()
}

})

/* START FILMU */

function startVideo(){

input.blur()

document.getElementById("screen").style.display="none"

videoContainer.style.display="flex"

video.play()

video.onended=function(){

videoContainer.style.display="none"

startBoot()

}

}


/* BIOS BOOT */

const boot=document.getElementById("boot")

const bootLines=[

"Phoenix BIOS v4.0 Release 6.0",
"Copyright 1985-1999 Phoenix Technologies",
"",
"Detecting hardware...",
"CPU: Intel Pentium detected",
"",
"Memory Test:"

]

let ram=0

function typeLine(text,callback){

let i=0

let interval=setInterval(()=>{

boot.textContent+=text[i]

i++

if(i>=text.length){

clearInterval(interval)

boot.textContent+="\n"

setTimeout(callback,200)

}

},20)

}

function startBoot(){

document.getElementById("bios").style.display="block"

let i=0

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++
next()

})

}else{

memoryTest()

}

}

next()

}

function memoryTest(){

let interval=setInterval(()=>{

ram+=512

boot.textContent=boot.textContent.replace(/Memory Test:.*/,"Memory Test: "+ram+"K")

if(ram>=8192){

clearInterval(interval)

boot.textContent+=" OK\n\n"
boot.textContent+="Booting DomekOS...\n\n"
boot.textContent+="Type /help to list commands\n\n"

startTerminal()

}

},120)

}


/* TERMINAL */

function startTerminal(){

let html=`

<span>C:\\CV></span>
<input id="command">

<div id="output"></div>

`

document.getElementById("bios").innerHTML+=html

const commandInput=document.getElementById("command")
const output=document.getElementById("output")

commandInput.focus()

commandInput.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=commandInput.value.trim()

let res=""

switch(cmd){

case "/help":
res="/profil /wyksztalcenie /umiejetnosci /zadania /kontakt"
break

case "/profil":
res="Kandydat: Domek\nStanowisko: Młodszy Informatyk"
break

case "/wyksztalcenie":
res="Technikum Informatyczne"
break

case "/umiejetnosci":
res="Instalacja Windows\nDiagnostyka sprzętu\nLinux\nAutomatyzacja Python"
break

case "/zadania":
res="Instalacja systemów operacyjnych\nHelpdesk\nKonfiguracja stacji roboczych"
break

case "/kontakt":
res="email: twoj@email.pl"
break

default:
res="Unknown command"

}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>"

commandInput.value=""

}

})

}

</script>

</body>

</html>
