<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro CV</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:monospace;
}

#scene{
position:relative;
width:900px;
}

#desk{
width:100%;
display:block;
}

#screen{

position:absolute;

/* dopasuj do miejsca ekranu monitora */
top:120px;
left:260px;

width:380px;
height:260px;

background:black;
color:#00ff00;

padding:10px;
overflow:auto;

box-shadow:
0 0 20px #00ff00 inset,
0 0 30px #00ff00;

}

/* scanlines CRT */

#screen::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
repeating-linear-gradient(
to bottom,
rgba(0,0,0,0) 0px,
rgba(0,0,0,0) 2px,
rgba(0,0,0,0.3) 3px
);

pointer-events:none;
}

input{
background:black;
border:none;
color:#00ff00;
font-family:monospace;
outline:none;
}

</style>
</head>

<body>

<div id="scene">

<img id="desk" src="desk.png">

<div id="screen">

<div id="output">
Phoenix BIOS v4.0<br>
Booting DomekOS...<br>
Type /help<br><br>
</div>

<span>C:\CV></span>
<input id="cmd">

</div>

</div>

<script>

const input = document.getElementById("cmd");
const output = document.getElementById("output");

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=input.value;

let res="";

switch(cmd){

case "/help":
res="komendy: /umiejetnosci /projekty /kontakt";
break;

case "/umiejetnosci":
res="Python<br>Linux<br>OBS<br>Automatyzacja";
break;

case "/projekty":
res="Bot TikTok Live<br>Mini gry streamowe";
break;

case "/kontakt":
res="email: twoj@email";
break;

default:
res="unknown command";
}

output.innerHTML += "C:\\CV>"+cmd+"<br>"+res+"<br><br>";

input.value="";

}

});

</script>

</body>
</html>
