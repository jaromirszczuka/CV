<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DomekOS CV</title>

<style>

body{
margin:0;
background:black;
font-family:monospace;
overflow:hidden;
color:#00ff66;
}

/* SCENY */

.scene{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* BUDYNEK */

#building img{
width:120%;
animation:zoomBuilding 3s forwards;
}

@keyframes zoomBuilding{
from{transform:scale(1)}
to{transform:scale(3)}
}

/* BIURKO */

#deskScene{
opacity:0;
}

#deskScene img{
width:900px;
animation:zoomDesk 4s forwards;
}

@keyframes zoomDesk{
from{transform:scale(0.8)}
to{transform:scale(2.5)}
}

/* BIOS */

#bios{
opacity:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100%;
}

#terminal{
width:900px;
}

pre{
color:#00ff66;
font-size:20px;
}

/* CRT effect */

pre::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
to bottom,
rgba(0,0,0,0) 0px,
rgba(0,0,0,0) 2px,
rgba(0,0,0,0.3) 3px
);
pointer-events:none;
}

input{
background:black;
border:none;
color:#00ff66;
font-family:monospace;
font-size:18px;
outline:none;
}

</style>
</head>

<body>

<audio id="bootSound" src="boot.mp3"></audio>

<!-- SCENA 1 BUDYNEK -->

<div id="building" class="scene">

<img src="budynek.png">

</div>

<!-- SCENA 2 BIURKO -->

<div id="deskScene" class="scene">

<img src="desk.png">

</div>

<!-- SCENA 3 BIOS -->

<div id="bios">

<div id="terminal">

<pre id="boot"></pre>

<div id="cmd" style="display:none">

<span>C:\CV></span>
<input id="command">

<div id="output"></div>

</div>

</div>

</div>

<script>

/* PRZEJŚCIA SCEN */

setTimeout(()=>{
document.getElementById("building").style.opacity="0"
document.getElementById("deskScene").style.opacity="1"
},3000)

setTimeout(()=>{
document.getElementById("deskScene").style.opacity="0"
document.getElementById("bios").style.opacity="1"
document.getElementById("bootSound").play()
startBoot()
},6500)

/* BIOS */

const boot = document.getElementById("boot")

const bootLines=[

"Phoenix BIOS v4.0 Release 6.0",
"Copyright 1985-1999 Phoenix Technologies",
"",
"Detecting hardware...",
"CPU: Intel Pentium detected",
"",
"Memory Test:"

]

let ram=0

function typeLine(text,callback){

let i=0

let interval=setInterval(()=>{

boot.textContent+=text[i]

i++

if(i>=text.length){

clearInterval(interval)

boot.textContent+="\n"

setTimeout(callback,200)

}

},20)

}

function startBoot(){

let i=0

function next(){

if(i<bootLines.length){

typeLine(bootLines[i],()=>{

i++
next()

})

}else{

memoryTest()

}

}

next()

}

function memoryTest(){

let interval=setInterval(()=>{

ram+=512

boot.textContent=boot.textContent.replace(/Memory Test:.*/,"Memory Test: "+ram+"K")

if(ram>=8192){

clearInterval(interval)

boot.textContent+=" OK\n\n"
boot.textContent+="Booting DomekOS...\n\n"
boot.textContent+="Type /help\n\n"

document.getElementById("cmd").style.display="block"

}

},120)

}

/* TERMINAL */

const commandInput=document.getElementById("command")
const output=document.getElementById("output")

commandInput.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=commandInput.value.trim()
let res=""

switch(cmd){

case "/help":
res="/profil /wyksztalcenie /umiejetnosci /zadania /kontakt"
break

case "/profil":
res="Kandydat: Domek\nStanowisko: Młodszy Informatyk\nZainteresowania: administracja systemów"
break

case "/wyksztalcenie":
res="Technikum Informatyczne"
break

case "/umiejetnosci":
res="Instalacja Windows\nDiagnostyka sprzętu\nLinux\nAutomatyzacja Python"
break

case "/zadania":
res="Instalacja systemów\nKonfiguracja stacji roboczych\nHelpdesk\nAktualizacje oprogramowania"
break

case "/kontakt":
res="email: ..."
break

default:
res="Unknown command"

}

output.innerHTML+="<pre>"+cmd+"\n"+res+"</pre>"

commandInput.value=""

}

})

</script>

</body>
</html>
